<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tend Your Universe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/4.0.11/dexie.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --void:#060610;--deep:#0a0a18;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.06);--text:#c8c4be;--dim:rgba(255,255,255,0.35);--faint:rgba(255,255,255,0.12);
  --cream:#e8e4dc;--star:#f0ebe2;
  --nebula:#6ea4e8;--nebula-glow:rgba(110,164,232,0.15);
  --bright:#8dc4ff;--bright-glow:rgba(141,196,255,0.25);
  --green:#6dd4a0;--green-bg:rgba(109,212,160,0.12);--green-glow:rgba(109,212,160,0.4);
  --yellow:#e8c35a;--yellow-bg:rgba(232,195,90,0.1);--yellow-glow:rgba(232,195,90,0.4);--yellow-border:rgba(232,195,90,0.2);
  --red:#e07070;--red-bg:rgba(224,112,112,0.1);--red-glow:rgba(224,112,112,0.4);--red-border:rgba(224,112,112,0.2);
  --orange:#e0963e;--orange-bg:rgba(224,150,62,0.1);--orange-border:rgba(224,150,62,0.2);
  --gold:#dfc470;--gold-bg:rgba(223,196,112,0.12);
  --serif:'Cormorant',Georgia,serif;--sans:'Outfit',sans-serif;--r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--void);color:var(--text);overflow:hidden}
body{font-family:var(--sans);font-weight:300;font-size:14px;line-height:1.5}

#app{height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ── Star field (permanent) ── */
#stars{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff}
.star-sm{width:1px;height:1px;opacity:0.3}
.star-md{width:2px;height:2px;opacity:0.5}
.star-lg{width:3px;height:3px;opacity:0.7;box-shadow:0 0 6px rgba(141,196,255,0.5)}
.star-twinkle{animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:0.8}}

/* Slow drift layer */
.drift{position:absolute;border-radius:50%;background:var(--nebula);filter:blur(40px);opacity:0.04;animation:driftFloat 30s ease-in-out infinite}
@keyframes driftFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}

/* ── +1 pop ── */
#pop{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:var(--serif);font-size:80px;font-weight:300;font-style:italic;color:var(--bright);pointer-events:none;z-index:50;opacity:0;text-shadow:0 0 40px var(--bright-glow),0 0 80px var(--nebula-glow)}
#pop.fire{animation:popBoom 1.4s cubic-bezier(0.2,0.8,0.3,1) forwards}
@keyframes popBoom{0%{opacity:0;transform:translate(-50%,-50%) scale(0.2)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}35%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-70%) scale(0.9)}}

/* ── Content ── */
#content{flex:1;position:relative;z-index:1;overflow:hidden;display:flex;flex-direction:column}

/* ═══ NAV ═══ */
.nav{display:flex;flex-shrink:0;border-top:1px solid var(--border);background:rgba(6,6,16,0.95);z-index:20;
  padding-bottom:max(4px,env(safe-area-inset-bottom,4px));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 6px;cursor:pointer;transition:color 0.3s;color:var(--dim);position:relative}
.nav-item:active{opacity:0.7}
.nav-on{color:var(--bright)}
.nav-icon{width:20px;height:20px}
.nav-icon svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:400}
.nav-badge{position:absolute;top:6px;right:calc(50% - 16px);width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red-glow)}

/* ═══ QUICK MODE ═══ */
.qm{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 0 2px;flex-shrink:0}
.qm-label{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.qm-sw{position:relative;width:36px;height:20px;cursor:pointer}
.qm-sw input{opacity:0;width:0;height:0}
.qm-tr{position:absolute;inset:0;background:var(--faint);border-radius:10px;transition:background 0.3s}
.qm-th{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--dim);transition:all 0.3s}
.qm-sw input:checked~.qm-tr{background:var(--nebula-glow)}
.qm-sw input:checked~.qm-th{left:18px;background:var(--bright)}

/* ═══ CHECK-IN ═══ */
.topbar{padding:14px 20px 8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-family:var(--serif);font-weight:300;font-size:16px;font-style:italic;color:var(--dim)}
.streak-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:400;color:var(--gold);
  background:var(--gold-bg);padding:4px 12px;border-radius:16px;border:1px solid rgba(223,196,112,0.15);letter-spacing:0.5px}
.counter{font-size:12px;color:var(--dim);letter-spacing:1px}

/* Star trail progress */
.pips{display:flex;gap:5px;padding:0 20px 10px;flex-shrink:0;justify-content:center}
.pip{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--faint)}
.pip-done{background:var(--bright);box-shadow:0 0 4px var(--bright-glow)}
.pip-now{background:var(--nebula);opacity:0.6}

.main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;padding:0 24px 90px}
.main::-webkit-scrollbar{width:0}

/* Nebula orb */
.neb{position:relative;width:180px;height:180px;margin:8px 0 12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#orb{position:absolute;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(141,196,255,0.5) 0%,rgba(110,164,232,0.25) 50%,rgba(80,130,200,0.08) 75%,transparent 100%);
  border:1px solid rgba(141,196,255,0.15);
  box-shadow:0 0 30px rgba(141,196,255,0.25),0 0 60px rgba(110,164,232,0.12),0 0 100px rgba(110,164,232,0.06);
  left:50%;top:50%;margin-left:-60px;margin-top:-60px}
.neb-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;pointer-events:none}
.neb-phase{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--dim);min-height:22px}
.neb-num{font-family:var(--serif);font-size:52px;font-weight:300;color:var(--bright);line-height:1;text-shadow:0 0 20px var(--bright-glow)}

.pname{font-family:var(--serif);font-weight:300;font-size:34px;color:var(--star);text-align:center;margin-bottom:2px;letter-spacing:0.5px}
.pname-pulse{animation:namePulse 4s ease-in-out}
@keyframes namePulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pcue{font-size:13px;color:var(--dim);text-align:center;font-style:italic;min-height:20px;margin-bottom:18px;font-family:var(--serif)}

.rpanel{width:100%;opacity:0;transform:translateY(24px);transition:all 0.55s cubic-bezier(0.25,0.46,0.45,0.94);pointer-events:none}
.rpanel-vis{opacity:1;transform:translateY(0);pointer-events:all}
.srow{display:flex;gap:10px;margin-bottom:14px}
.sbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:16px 6px;
  border:1px solid var(--faint);border-radius:var(--r);background:transparent;
  font-family:var(--sans);font-size:11px;font-weight:300;color:var(--dim);cursor:pointer;transition:all 0.25s;letter-spacing:0.5px}
.sbtn:active{transform:scale(0.95)}
.sdot{width:24px;height:24px;border-radius:50%;transition:transform 0.3s,box-shadow 0.3s}
.sbtn[data-v="good"] .sdot{background:var(--green)}
.sbtn[data-v="needs_attention"] .sdot{background:var(--yellow)}
.sbtn[data-v="urgent"] .sdot{background:var(--red)}
.sbtn-on{border-color:transparent}
.sbtn-on[data-v="good"]{background:var(--green-bg);color:var(--green);border-color:rgba(109,212,160,0.25)}
.sbtn-on[data-v="good"] .sdot{transform:scale(1.2);box-shadow:0 0 16px var(--green-glow)}
.sbtn-on[data-v="needs_attention"]{background:var(--yellow-bg);color:var(--yellow);border-color:rgba(232,195,90,0.25)}
.sbtn-on[data-v="needs_attention"] .sdot{transform:scale(1.2);box-shadow:0 0 16px var(--yellow-glow)}
.sbtn-on[data-v="urgent"]{background:var(--red-bg);color:var(--red);border-color:rgba(224,112,112,0.25)}
.sbtn-on[data-v="urgent"] .sdot{transform:scale(1.2);box-shadow:0 0 16px var(--red-glow)}

.fields{overflow:hidden;max-height:0;opacity:0;transition:max-height 0.4s ease,opacity 0.3s}
.fields-open{max-height:240px;opacity:1}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:9px;color:var(--dim);margin-bottom:5px;letter-spacing:1.5px;text-transform:uppercase}
.fld textarea{width:100%;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,0.03);
  padding:11px 14px;font-family:var(--sans);font-size:13px;font-weight:200;color:var(--text);
  line-height:1.4;resize:none;outline:none;min-height:42px}
.fld textarea:focus{border-color:rgba(141,196,255,0.3);box-shadow:0 0 20px var(--nebula-glow)}
.fld textarea::placeholder{color:var(--faint);font-style:italic}

.bbar{position:absolute;bottom:0;left:0;right:0;padding:10px 24px 16px;background:linear-gradient(to top,var(--void) 55%,transparent);z-index:10}
.nbtn{width:100%;padding:15px;border:none;border-radius:var(--r);
  background:linear-gradient(135deg,var(--nebula),var(--bright));
  color:var(--void);font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:1px;
  cursor:pointer;transition:all 0.2s;opacity:0.15;pointer-events:none;text-transform:uppercase}
.nbtn-go{opacity:1;pointer-events:all}
.nbtn:active{transform:scale(0.98)}

/* Done screen */
.done{display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px 0 40px;opacity:0;transform:translateY(16px);animation:fadeUp 0.6s 0.15s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.dring{position:relative;width:130px;height:130px;margin-bottom:18px}
.dring svg{width:100%;height:100%;transform:rotate(-90deg)}
.dring circle{fill:none;stroke-linecap:round}
.dring-bg{stroke:var(--faint);stroke-width:3}
.dring-fg{stroke:var(--bright);stroke-width:4;transition:stroke-dashoffset 2s cubic-bezier(0.4,0,0.2,1);filter:drop-shadow(0 0 6px var(--bright-glow))}
.dring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dring-num{font-family:var(--serif);font-size:40px;color:var(--star);line-height:1}
.dring-pct{font-family:var(--serif);font-size:14px;color:var(--dim)}
.dring-lbl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:2.5px;margin-top:2px}
.dtitle{font-family:var(--serif);font-size:24px;font-weight:300;color:var(--star);margin-bottom:4px;font-style:italic}
.dsub{color:var(--dim);font-size:13px;margin-bottom:14px;max-width:260px;font-family:var(--serif);font-style:italic}
.dstreak{display:flex;align-items:center;gap:6px;background:var(--gold-bg);border:1px solid rgba(223,196,112,0.12);color:var(--gold);padding:8px 18px;border-radius:20px;font-size:12px;font-weight:400;margin-bottom:18px;letter-spacing:0.5px}
.dsum{width:100%;max-width:300px;text-align:left}
.si{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.si:last-child{border-bottom:none}
.sn{color:var(--text);font-weight:300}.sb{font-size:10px;font-weight:400;padding:3px 10px;border-radius:16px;text-transform:capitalize;letter-spacing:0.5px}
.sb-good{background:var(--green-bg);color:var(--green)}.sb-needs_attention{background:var(--yellow-bg);color:var(--yellow)}.sb-urgent{background:var(--red-bg);color:var(--red)}
.rbtn{margin-top:18px;padding:10px 24px;border:1px solid var(--faint);border-radius:20px;background:transparent;font-family:var(--sans);font-size:11px;color:var(--dim);cursor:pointer;transition:all 0.2s;letter-spacing:1px;text-transform:uppercase}
.rbtn:hover{border-color:var(--dim);color:var(--text)}

/* ═══ HISTORY ═══ */
.h-tabs{display:flex;gap:0;padding:14px 20px 12px;flex-shrink:0}
.h-tab{flex:1;padding:9px 0;text-align:center;font-size:11px;font-weight:300;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);background:transparent;border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
.h-tab:first-child{border-radius:20px 0 0 20px}.h-tab:last-child{border-radius:0 20px 20px 0}
.h-tab-on{background:var(--nebula-glow);color:var(--bright);border-color:rgba(141,196,255,0.2);font-weight:400}
.h-tab:active{transform:scale(0.98)}
.h-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.h-scroll::-webkit-scrollbar{width:0}
.map-card{margin:0 16px 14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 14px 10px;backdrop-filter:blur(8px)}
.map-hint{text-align:center;font-size:11px;color:var(--dim);font-style:italic;margin-bottom:6px;font-family:var(--serif)}
.body-svg{display:block;margin:0 auto;width:210px;height:310px}
.body-outline{fill:none;stroke:rgba(141,196,255,0.12);stroke-width:1;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:4 4}
.zone{cursor:pointer;transition:all 0.2s}.zone:active{opacity:0.7}
.zone-ring{stroke-width:1.5;fill-opacity:0.15;transition:all 0.3s}
.zone-ring-good{stroke:var(--green-glow);fill:var(--green)}
.zone-ring-needs_attention{stroke:var(--yellow-glow);fill:var(--yellow)}
.zone-ring-urgent{stroke:var(--red-glow);fill:var(--red)}
.zone-ring-none{stroke:rgba(255,255,255,0.1);fill:#fff;fill-opacity:0.03}
.zone-ring-selected{stroke-width:2.5;filter:drop-shadow(0 0 8px var(--bright-glow))}
.zone-label{font-family:var(--sans);font-size:6px;fill:var(--dim);text-anchor:middle;pointer-events:none;letter-spacing:1px;text-transform:uppercase}
/* Constellation lines */
.const-line{stroke:rgba(141,196,255,0.08);stroke-width:0.5}
.legend{display:flex;gap:14px;justify-content:center;padding:6px 0 2px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim)}
.legend-dot{width:6px;height:6px;border-radius:50%}
.h-detail{padding:0 20px 32px}
.detail-title{display:flex;align-items:center;gap:10px;padding:14px 0 10px}
.detail-name{font-family:var(--serif);font-size:22px;color:var(--star);font-weight:300;font-style:italic}
.detail-prompt{text-align:center;padding:36px 20px;color:var(--dim);font-style:italic;font-size:14px;font-family:var(--serif)}
.entry-row{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:5px;border-radius:10px;transition:all 0.2s}
.entry-row-good{background:var(--green-bg)}.entry-row-needs_attention{background:var(--yellow-bg)}.entry-row-urgent{background:var(--red-bg)}
.entry-date{font-size:11px;font-weight:400;color:var(--text);min-width:42px}
.entry-status{font-size:12px;flex:1;font-weight:300}
.entry-status-good{color:var(--green)}.entry-status-needs_attention{color:var(--yellow)}.entry-status-urgent{color:var(--red)}
.entry-arrow{color:var(--faint);font-size:12px}
.entry-expanded{padding:7px 12px 10px;margin:-1px 0 5px;border-radius:0 0 10px 10px;font-size:11px;color:var(--dim);line-height:1.5;background:var(--surface);border-top:1px solid var(--border)}
.entry-expanded b{color:var(--text);font-weight:300}
.entry-none{text-align:center;padding:20px;color:var(--dim);font-style:italic;font-size:12px;font-family:var(--serif)}

/* ═══ FLAGS ═══ */
.f-header{padding:18px 24px 6px;flex-shrink:0}
.f-title{font-family:var(--serif);font-weight:300;font-size:28px;color:var(--star);font-style:italic}
.f-sub{font-size:12px;color:var(--dim);font-style:italic;margin-top:2px;font-family:var(--serif)}
.f-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 20px 32px}.f-scroll::-webkit-scrollbar{width:0}
.all-clear{text-align:center;padding:50px 24px}
.all-clear-icon{font-size:48px;margin-bottom:14px;opacity:0.7}
.all-clear-title{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--star);margin-bottom:6px}
.all-clear-sub{font-size:13px;color:var(--dim);max-width:260px;margin:0 auto;font-family:var(--serif);font-style:italic}
.flag-card{background:var(--surface);border-radius:14px;padding:18px;margin-bottom:12px;border-left:2px solid transparent;backdrop-filter:blur(4px)}
.flag-card-noaction{border-left-color:var(--red)}.flag-card-noimprove{border-left-color:var(--orange)}
.flag-type{font-size:9px;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:8px;font-weight:400}
.flag-type-noaction{color:var(--red)}.flag-type-noimprove{color:var(--orange)}
.flag-part{font-family:var(--serif);font-size:22px;color:var(--star);font-weight:300;font-style:italic;margin-bottom:3px}
.flag-duration{font-size:12px;color:var(--dim);margin-bottom:10px}
.trend{display:flex;gap:3px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.trend-dot{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(255,255,255,0.5)}
.trend-dot-good{background:var(--green-bg);border:1px solid rgba(109,212,160,0.2)}
.trend-dot-needs_attention{background:var(--yellow-bg);border:1px solid var(--yellow-border)}
.trend-dot-urgent{background:var(--red-bg);border:1px solid var(--red-border)}
.trend-dot-skip{background:transparent;border:1px dashed var(--faint);color:var(--faint)}
.trend-label{font-size:9px;color:var(--faint);margin-left:4px}
.flag-rem{background:var(--surface2);border-radius:8px;padding:9px 11px;font-size:12px;color:var(--dim);margin-bottom:12px;border-left:2px solid var(--faint)}
.flag-rem b{color:var(--text);font-weight:300}
.flag-msg{font-size:13px;color:var(--text);line-height:1.6;padding:11px 13px;background:var(--surface);border-radius:10px;border:1px solid var(--border);font-weight:200}
.section-label{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
.section-line{flex:1;height:1px;background:var(--border)}
.section-text{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:2.5px}
/* ═══ ONBOARDING ═══ */
#onboarding{position:absolute;inset:0;z-index:100;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;overflow:hidden}
#onboarding .ob-stars{position:absolute;inset:0;pointer-events:none}

.ob-slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;opacity:0;pointer-events:none;transition:opacity 0.8s ease,transform 0.8s ease;transform:translateY(20px)}
.ob-slide.ob-active{opacity:1;pointer-events:all;transform:translateY(0)}
.ob-slide.ob-exit{opacity:0;transform:translateY(-20px)}

.ob-sanskrit{font-size:28px;color:var(--star);line-height:1.6;margin-bottom:16px;opacity:0;animation:obFadeIn 1.5s 0.3s ease forwards}
.ob-translit{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--dim);margin-bottom:8px;opacity:0;animation:obFadeIn 1.2s 1.2s ease forwards}
.ob-meaning{font-family:var(--serif);font-size:18px;font-style:italic;color:var(--bright);opacity:0;animation:obFadeIn 1.2s 2s ease forwards}
@keyframes obFadeIn{to{opacity:1}}

.ob-body-svg{width:200px;height:290px;margin-bottom:20px}
.ob-body-line{stroke:rgba(141,196,255,0.2);stroke-width:1;fill:none;stroke-dasharray:500;stroke-dashoffset:500;animation:obDrawLine 2s ease forwards}
@keyframes obDrawLine{to{stroke-dashoffset:0}}
.ob-body-star{fill:var(--bright);opacity:0}
.ob-star-appear{animation:obStarPop 0.4s ease forwards}
@keyframes obStarPop{0%{opacity:0;r:0}100%{opacity:1}}

.ob-copy{font-family:var(--serif);font-size:17px;font-style:italic;color:var(--text);line-height:1.7;max-width:300px;opacity:0;animation:obFadeIn 1s 0.5s ease forwards;font-weight:300}

.ob-neb{width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(141,196,255,0.5),rgba(110,164,232,0.2) 50%,transparent 80%);
  box-shadow:0 0 40px rgba(141,196,255,0.3),0 0 80px rgba(110,164,232,0.1);
  margin-bottom:20px;animation:obNebPulse 4s ease-in-out infinite;opacity:0}
.ob-neb.ob-neb-go{animation:obNebBreathe 4s ease-in-out forwards;opacity:1}
@keyframes obNebPulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.05);opacity:1}}
@keyframes obNebBreathe{0%{transform:scale(0.8);opacity:0.5}50%{transform:scale(1.4);opacity:1;box-shadow:0 0 60px rgba(141,196,255,0.5),0 0 120px rgba(110,164,232,0.2)}100%{transform:scale(1);opacity:0.8}}

.ob-copy2{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--text);line-height:1.7;max-width:280px;font-weight:300}

.ob-constellation-done{width:200px;height:290px;margin-bottom:16px}
.ob-constellation-done .ob-body-line{animation:obDrawLine 1.5s ease forwards}
.ob-star-glow{fill:var(--bright);filter:drop-shadow(0 0 4px var(--bright-glow))}

.ob-begin-btn{margin-top:24px;padding:14px 40px;border:none;border-radius:24px;
  background:linear-gradient(135deg,var(--nebula),var(--bright));
  color:var(--void);font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;opacity:0;animation:obFadeIn 0.8s 1s ease forwards}
.ob-begin-btn:active{transform:scale(0.97)}

.ob-tap{position:absolute;bottom:40px;font-size:11px;color:var(--faint);letter-spacing:2px;text-transform:uppercase;opacity:0;animation:obFadeIn 0.8s 3s ease forwards}
</style>
</head>
<body>
<div id="app">
  <div id="onboarding" style="display:none"></div>
  <div id="stars"></div>
  <div id="pop">+1</div>
  <div id="content"></div>
  <div class="nav" id="nav">
    <div class="nav-item nav-on" onclick="navigate('today')" id="nav-today">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
      <span class="nav-label">Today</span>
    </div>
    <div class="nav-item" onclick="navigate('history')" id="nav-history">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="6" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/><circle cx="12" cy="19" r="2"/><line x1="12" y1="7" x2="12" y2="17" opacity="0.3"/><line x1="7.5" y1="12" x2="16.5" y2="12" opacity="0.3"/></svg></span>
      <span class="nav-label">Map</span>
    </div>
    <div class="nav-item" onclick="navigate('flags')" id="nav-flags">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2L9 9H2l5.5 4.5L5.5 22 12 17l6.5 5-2-8.5L22 9h-7z"/></svg></span>
      <span class="nav-label">Signals</span>
    </div>
  </div>
</div>

<script>
/* ═══ SHARED ═══ */
function G(id){return document.getElementById(id)}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function pad(n){return n<10?'0'+n:''+n}
function ds(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function addD(s,n){var d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return ds(d)}
function daysBtw(a,b){return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/864e5)}
function daysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0]}

/* ═══ AUDIO ═══ */
var actx;
function unlockAudio(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){actx=null}if(actx&&actx.state==='suspended')actx.resume().catch(function(){})}
document.addEventListener('click',function f(){unlockAudio();document.removeEventListener('click',f)});
document.addEventListener('touchstart',function f(){unlockAudio();document.removeEventListener('touchstart',f)});
function tn(f,d,v){if(!actx||actx.state!=='running')return;try{var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d)}catch(e){}}
function chimeIn(){tn(285,1.0,0.12);tn(396,1.0,0.08)}
function chimeReveal(){tn(528,0.6,0.10);tn(639,0.8,0.06)}
function chimeDone(){tn(528,0.5,0.12);setTimeout(function(){tn(660,0.7,0.10)},250);setTimeout(function(){tn(792,0.9,0.08)},500)}

/* ═══ STAR FIELD ═══ */
(function(){
  var c=G('stars');
  for(var i=0;i<80;i++){
    var s=document.createElement('div');
    var r=Math.random();
    s.className='star '+(r<0.6?'star-sm':r<0.85?'star-md':'star-lg');
    if(Math.random()<0.15){s.classList.add('star-twinkle');s.style.animationDuration=(2+Math.random()*4)+'s';s.style.animationDelay=Math.random()*5+'s'}
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    c.appendChild(s);
  }
  // Nebula drift blobs
  for(var i=0;i<3;i++){
    var d=document.createElement('div');d.className='drift';
    var sz=100+Math.random()*150;d.style.width=sz+'px';d.style.height=sz+'px';
    d.style.left=(10+Math.random()*60)+'%';d.style.top=(10+Math.random()*60)+'%';
    d.style.animationDelay=(Math.random()*15)+'s';d.style.animationDuration=(20+Math.random()*20)+'s';
    c.appendChild(d);
  }
})();

/* ═══ DATABASE ═══ */
var db=new Dexie('BodyScanDB');
db.version(1).stores({bodyParts:'++id, &name',entries:'++id, bodyPartId, date, [bodyPartId+date]'});
db.version(2).stores({bodyParts:'++id, &name',entries:'++id, bodyPartId, date, [bodyPartId+date]',streaks:'&key'});
var DEFAULTS=['Head','Eyes','Nose','Face','Neck','Shoulders','Back','Chest','Abdomen','Left Knee','Right Knee','Left Foot','Right Foot'];

/* ═══ STATE ═══ */
var parts=[],partMap={},ci=0,responses=[],streak=0,breathTimer=null,flagCount=0,quickMode=false;
var breathed={}; // tracks which body parts have had their breath this session
var today=new Date().toISOString().split('T')[0],currentScreen='today';
var hTab='today',hSelZone=null,hExpEntry=null,hAllE=[];
var BZ={'Head':{cx:110,cy:28,r:16},'Eyes':{cx:110,cy:50,r:9},'Nose':{cx:110,cy:66,r:7},'Face':{cx:110,cy:80,r:11},'Neck':{cx:110,cy:100,r:8},'Shoulders':{cx:110,cy:118,r:15},'Back':{cx:110,cy:148,r:13},'Chest':{cx:110,cy:135,r:12},'Abdomen':{cx:110,cy:168,r:13},'Left Knee':{cx:90,cy:224,r:10},'Right Knee':{cx:130,cy:224,r:10},'Left Foot':{cx:86,cy:290,r:9},'Right Foot':{cx:134,cy:290,r:9}};
// Constellation connections
var CONST_LINES=[['Head','Eyes'],['Eyes','Nose'],['Nose','Face'],['Face','Neck'],['Neck','Shoulders'],['Neck','Chest'],['Chest','Back'],['Chest','Abdomen'],['Shoulders','Left Knee'],['Shoulders','Right Knee'],['Abdomen','Left Knee'],['Abdomen','Right Knee'],['Left Knee','Left Foot'],['Right Knee','Right Foot']];

/* ═══ BOOT ═══ */
(async function(){
  if(await db.bodyParts.count()===0) await db.bodyParts.bulkAdd(DEFAULTS.map(function(n){return{name:n}}));
  parts=await db.bodyParts.orderBy('id').toArray();
  for(var i=0;i<parts.length;i++) partMap[parts[i].id]=parts[i].name;
  for(var i=0;i<parts.length;i++){
    var ex=await db.entries.where('[bodyPartId+date]').equals([parts[i].id,today]).first();
    responses.push({bodyPartId:parts[i].id,status:ex?ex.status:null,notes:ex?ex.notes:'',remediation:ex?ex.remediation:''});
    if(ex) breathed[i]=true;
  }
  try{var s=await db.streaks.get('current');if(s){var yd=new Date(Date.now()-864e5).toISOString().split('T')[0];streak=(s.lastDate===today||s.lastDate===yd)?s.count:0;}}catch(e){streak=0}
  await updateBadge();

  // Check if onboarding needed
  var onboarded=false;
  try{var ob=await db.streaks.get('onboarded');if(ob&&ob.count===1)onboarded=true;}catch(e){}
  if(!onboarded){
    G('nav').style.display='none';
    startOnboarding();
  }else{
    showToday();
  }
})();

/* ═══ NAVIGATION ═══ */
function navigate(s){if(breathTimer){clearInterval(breathTimer);breathTimer=null}currentScreen=s;G('nav-today').className='nav-item'+(s==='today'?' nav-on':'');G('nav-history').className='nav-item'+(s==='history'?' nav-on':'');G('nav-flags').className='nav-item'+(s==='flags'?' nav-on':'');if(s==='today')showToday();else if(s==='history')showHistory();else showFlags()}
async function updateBadge(){var flags=await detectFlags();flagCount=flags.length;var ex=document.querySelector('.nav-badge');if(ex)ex.remove();if(flagCount>0){var b=document.createElement('span');b.className='nav-badge';G('nav-flags').appendChild(b)}}

/* ══════════════════════════════════════════════════════════════
   TODAY
   ══════════════════════════════════════════════════════════════ */
function showToday(){renderSlide()}
function pipH(){var h='';for(var j=0;j<parts.length;j++){var c='pip';if(j<ci)c+=' pip-done';else if(j===ci)c+=' pip-now';h+='<span class="'+c+'"></span>'}return h}

function renderSlide(){
  if(breathTimer){clearInterval(breathTimer);breathTimer=null}
  var n=parts.length,p=parts[ci],r=responses[ci];
  // Default to 'good' if no status yet
  var st=r.status||'good';
  var sb=(!quickMode&&!breathed[ci]);
  G('content').innerHTML=
    '<div class="topbar"><div class="topbar-left"><span class="topbar-title">Tend your universe</span><span class="streak-pill">\u2729 '+(streak>0?streak+' day'+(streak>1?'s':''):'Day 1')+'</span></div><span class="counter">'+(ci+1)+' / '+n+'</span></div>'+
    '<div class="qm"><span class="qm-label">Quick</span><label class="qm-sw"><input type="checkbox" '+(quickMode?'checked':'')+' onchange="toggleQM(this.checked)"><span class="qm-tr"></span><span class="qm-th"></span></label></div>'+
    '<div class="pips">'+pipH()+'</div>'+
    '<div class="main" id="mainArea">'+
      (sb?'<div class="neb"><div id="orb"></div><div class="neb-center"><div class="neb-phase" id="phase"></div><div class="neb-num" id="num"></div></div></div>':'')+
    '<h1 class="pname" id="pname">'+p.name+'</h1>'+
    '<p class="pcue" id="cue">'+(sb?'':'How is this star feeling?')+'</p>'+
    '<div class="rpanel'+(sb?'':' rpanel-vis')+'" id="rpanel"><div class="srow">'+
    '<button class="sbtn'+(st==='good'?' sbtn-on':'')+'" data-v="good" onclick="pick(\'good\')"><span class="sdot"></span>Bright</button>'+
    '<button class="sbtn'+(st==='needs_attention'?' sbtn-on':'')+'" data-v="needs_attention" onclick="pick(\'needs_attention\')"><span class="sdot"></span>Dimming</button>'+
    '<button class="sbtn'+(st==='urgent'?' sbtn-on':'')+'" data-v="urgent" onclick="pick(\'urgent\')"><span class="sdot"></span>Fading</button></div>'+
    '<div class="fields fields-open" id="fields"><div class="fld"><label>What do you notice?</label><textarea id="notesIn" rows="2" placeholder="Any sensations, feelings\u2026">'+r.notes+'</textarea></div>'+
    '<div class="fld"><label>Steps you\u2019re taking</label><textarea id="remIn" rows="2" placeholder="Stretches, exercises, rest, supplements\u2026">'+r.remediation+'</textarea></div></div></div></div>'+
    '<div class="bbar"><button class="nbtn nbtn-go" id="nbtn" onclick="goNext()">'+(ci===n-1?'Complete':'Next star')+'</button></div>';
  // Set default status in responses if not already set
  if(!r.status) responses[ci].status='good';
  if(sb)setTimeout(startBreath,400);
}
function toggleQM(v){quickMode=v;if(breathTimer){clearInterval(breathTimer);breathTimer=null}renderSlide()}

function startBreath(){
  unlockAudio();
  var orb=G('orb'),phase=G('phase'),num=G('num'),cue=G('cue'),pname=G('pname');
  if(!orb||!phase)return;
  var el=0;
  orb.style.transition='transform 1s ease,background 1s ease,box-shadow 1s ease';
  chimeIn();phase.textContent='Breathe in\u2026';
  cue.textContent='Send your breath toward '+parts[ci].name.toLowerCase();
  pname.classList.add('pname-pulse');
  function tick(){
    if(el<4){
      var t=el/4;
      orb.style.transform='scale('+(1+t*0.6).toFixed(2)+')';
      orb.style.background='radial-gradient(circle at 40% 35%,rgba(141,196,255,'+(0.3+t*0.25).toFixed(2)+'),rgba(110,164,232,'+(0.12+t*0.15).toFixed(2)+') 60%,transparent 80%)';
      orb.style.boxShadow='0 0 '+(40+t*50)+'px rgba(141,196,255,'+(0.15+t*0.2).toFixed(2)+'),0 0 '+(80+t*60)+'px rgba(110,164,232,'+(0.06+t*0.1).toFixed(2)+')';
      num.textContent=4-el;
    }else{
      clearInterval(breathTimer);breathTimer=null;
      breathed[ci]=true;
      phase.textContent='';num.textContent='';
      cue.textContent='How is this star feeling?';
      pname.classList.remove('pname-pulse');chimeReveal();
      G('rpanel').classList.add('rpanel-vis');
      setTimeout(function(){var m=G('mainArea');if(m)m.scrollTo({top:9999,behavior:'smooth'})},150);return;
    }
    el++;
  }
  tick();breathTimer=setInterval(tick,1000);
}

function pick(s){responses[ci].status=s;document.querySelectorAll('.sbtn').forEach(function(b){b.classList.toggle('sbtn-on',b.dataset.v===s)});G('fields').classList.add('fields-open');G('nbtn').classList.add('nbtn-go')}

async function goNext(){
  var btn=G('nbtn');if(!btn.classList.contains('nbtn-go'))return;
  if(breathTimer){clearInterval(breathTimer);breathTimer=null}
  var nE=G('notesIn'),rE=G('remIn');if(nE)responses[ci].notes=nE.value.trim();if(rE)responses[ci].remediation=rE.value.trim();
  var r=responses[ci],ex=await db.entries.where('[bodyPartId+date]').equals([r.bodyPartId,today]).first();
  await db.entries.put({id:ex?ex.id:undefined,bodyPartId:r.bodyPartId,date:today,status:r.status,notes:r.notes,remediation:r.remediation,createdAt:ex?ex.createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
  firePop();
  if(ci<parts.length-1){ci++;setTimeout(renderSlide,350)}else{await saveStreak();await updateBadge();setTimeout(renderDone,450)}
}
function firePop(){var p=G('pop');p.className='';void p.offsetWidth;p.className='fire'}
async function saveStreak(){try{var s=await db.streaks.get('current');var yd=new Date(Date.now()-864e5).toISOString().split('T')[0];var nc=1;if(s){if(s.lastDate===today)nc=s.count;else if(s.lastDate===yd)nc=s.count+1}await db.streaks.put({key:'current',count:nc,lastDate:today});streak=nc}catch(e){streak=Math.max(streak,1)}}

function renderDone(){
  chimeDone();var total=parts.length,gc=responses.filter(function(r){return r.status==='good'}).length,pct=Math.round((gc/total)*100);
  var C=2*Math.PI*56,off=C-(pct/100)*C;
  var uc=responses.filter(function(r){return r.status==='urgent'}).length,ac=responses.filter(function(r){return r.status==='needs_attention'}).length;
  var msg="Your constellation is bright tonight.";
  if(uc>0)msg=uc+' star'+(uc>1?'s are':' is')+' fading. Tend to '+(uc>1?'them':'it')+' gently.';
  else if(ac>0)msg='Most stars shine bright. '+ac+' '+(ac>1?'are':'is')+' dimming a little.';
  var sum='';for(var i=0;i<responses.length;i++){var lb=responses[i].status==='needs_attention'?'dimming':responses[i].status==='urgent'?'fading':'bright';sum+='<div class="si"><span class="sn">'+parts[i].name+'</span><span class="sb sb-'+responses[i].status+'">'+lb+'</span></div>'}
  var ap='';for(var j=0;j<parts.length;j++)ap+='<span class="pip pip-done"></span>';
  G('content').innerHTML=
    '<div class="topbar"><div class="topbar-left"><span class="topbar-title">Tend your universe</span></div><span class="counter">Complete</span></div>'+
    '<div class="pips">'+ap+'</div><div class="main"><div class="done">'+
    '<div class="dring"><svg viewBox="0 0 120 120"><circle class="dring-bg" cx="60" cy="60" r="56"/><circle class="dring-fg" cx="60" cy="60" r="56" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'" id="arc"/></svg><div class="dring-center"><span class="dring-num">'+pct+'</span><span class="dring-pct">%</span><span class="dring-lbl">universe</span></div></div>'+
    '<h1 class="dtitle">Scan complete</h1><p class="dsub">'+msg+'</p>'+
    '<div class="dstreak">\u2729 '+streak+' day streak \u2014 '+(streak<3?'stars aligning':streak<7?'building a galaxy':'cosmic consistency')+'</div>'+
    '<div class="dsum">'+sum+'</div><button class="rbtn" onclick="restart()">Scan again</button></div></div>';
  setTimeout(function(){var a=G('arc');if(a)a.style.strokeDashoffset=off},500);
}
function restart(){ci=0;breathed={};responses=parts.map(function(p){return{bodyPartId:p.id,status:null,notes:'',remediation:''}});renderSlide()}

/* ══════════════════════════════════════════════════════════════
   HISTORY
   ══════════════════════════════════════════════════════════════ */
async function showHistory(){hSelZone=null;hExpEntry=null;hAllE=await db.entries.orderBy('date').toArray();renderHScreen()}
function renderHScreen(){
  G('content').innerHTML='<div class="h-tabs">'+['today','7d','30d','all'].map(function(t){var l={today:'Today','7d':'7 days','30d':'30 days',all:'All'};return'<div class="h-tab'+(hTab===t?' h-tab-on':'')+'" onclick="setHT(\''+t+'\')">'+l[t]+'</div>'}).join('')+'</div>'+
  '<div class="h-scroll" id="hScr"><div class="map-card"><div class="map-hint" id="mapH"></div><svg class="body-svg" viewBox="0 0 220 320" id="bSvg"></svg>'+
  '<div class="legend"><span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>Bright</span><span class="legend-item"><span class="legend-dot" style="background:var(--yellow)"></span>Dimming</span><span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>Fading</span></div></div>'+
  '<div class="h-detail" id="hDet"><div class="detail-prompt">Tap a star in your constellation</div></div></div>';
  renderBMap();
}
function setHT(t){hTab=t;hSelZone=null;hExpEntry=null;renderHScreen()}
function hRange(){if(hTab==='today')return{s:today,e:today};if(hTab==='7d')return{s:daysAgo(6),e:today};if(hTab==='30d')return{s:daysAgo(29),e:today};return{s:'2000-01-01',e:today}}
function hWorst(pid){var rn=hRange(),w='none';for(var i=0;i<hAllE.length;i++){var e=hAllE[i];if(e.bodyPartId!==pid)continue;if(e.date<rn.s||e.date>rn.e)continue;if(e.status==='urgent')return'urgent';if(e.status==='needs_attention')w='needs_attention';if(e.status==='good'&&w==='none')w='good'}return w}

function renderBMap(){
  var svg=G('bSvg'),h='';
  // Constellation lines first (behind zones)
  var partByName={};for(var i=0;i<parts.length;i++)partByName[parts[i].name]=parts[i];
  h+='<g>';
  for(var i=0;i<CONST_LINES.length;i++){
    var a=BZ[CONST_LINES[i][0]],b=BZ[CONST_LINES[i][1]];
    if(a&&b)h+='<line class="const-line" x1="'+a.cx+'" y1="'+a.cy+'" x2="'+b.cx+'" y2="'+b.cy+'"/>';
  }
  h+='</g>';
  // Body outline (subtle dashed)
  h+='<g class="body-outline"><ellipse cx="110" cy="28" rx="14" ry="16"/><path d="M80,68 Q80,54 110,54 Q140,54 140,68 L143,128 Q143,185 110,190 Q77,185 77,128 Z"/><path d="M80,63 Q58,68 48,105 Q42,135 45,155"/><path d="M140,63 Q162,68 172,105 Q178,135 175,155"/><path d="M95,186 Q88,215 87,240 Q85,265 84,295"/><path d="M125,186 Q132,215 133,240 Q135,265 136,295"/></g>';
  // Zones
  for(var i=0;i<parts.length;i++){var p=parts[i],z=BZ[p.name];if(!z)continue;var st=hWorst(p.id),sel=(hSelZone===p.id);
    h+='<g class="zone" onclick="tapZ('+p.id+')"><circle class="zone-ring zone-ring-'+st+(sel?' zone-ring-selected':'')+'" cx="'+z.cx+'" cy="'+z.cy+'" r="'+z.r+'"/>';
    if(sel)h+='<text class="zone-label" x="'+z.cx+'" y="'+(z.cy+z.r+10)+'">'+p.name+'</text>';
    h+='</g>'}
  svg.innerHTML=h;
  var lbl={today:'Today',  '7d':'Past 7 days','30d':'Past 30 days',all:'All time'};
  G('mapH').textContent=lbl[hTab]+' \u00B7 tap a star';
}

function tapZ(pid){
  hSelZone=pid;hExpEntry=null;renderBMap();
  var rn=hRange(),ents=[];for(var i=0;i<hAllE.length;i++){var e=hAllE[i];if(e.bodyPartId===pid&&e.date>=rn.s&&e.date<=rn.e)ents.push(e)}
  ents.sort(function(a,b){return b.date.localeCompare(a.date)});
  var area=G('hDet'),nm=partMap[pid]||'?',html='<div class="detail-title"><span class="detail-name">'+nm+'</span></div>';
  if(!ents.length){html+='<div class="entry-none">No readings for '+nm+' in this range</div>';area.innerHTML=html;return}
  var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for(var i=0;i<ents.length;i++){var e=ents[i],d=new Date(e.date+'T12:00:00'),dl=MO[d.getMonth()]+' '+d.getDate(),sl=e.status==='needs_attention'?'Dimming':e.status==='urgent'?'Fading':'Bright',has=(e.notes||e.remediation),exp=(hExpEntry===e.id);
    html+='<div class="entry-row entry-row-'+e.status+'"'+(has?' onclick="togHE('+e.id+')" style="cursor:pointer"':'')+'><span class="entry-date">'+dl+'</span><span class="entry-status entry-status-'+e.status+'">'+sl+'</span>'+(has?'<span class="entry-arrow">'+(exp?'\u25B4':'\u25BE')+'</span>':'')+'</div>';
    if(exp&&has){html+='<div class="entry-expanded">';if(e.notes)html+='<b>Noticed:</b> '+esc(e.notes)+'<br>';if(e.remediation)html+='<b>Tending to it:</b> '+esc(e.remediation);html+='</div>'}}
  area.innerHTML=html;setTimeout(function(){area.scrollIntoView({behavior:'smooth',block:'start'})},150);
}
function togHE(id){hExpEntry=(hExpEntry===id)?null:id;if(hSelZone)tapZ(hSelZone)}

/* ══════════════════════════════════════════════════════════════
   FLAGS
   ══════════════════════════════════════════════════════════════ */
async function showFlags(){var fl=await detectFlags();G('content').innerHTML='<div class="f-header"><div class="f-title">Cosmic signals</div><div class="f-sub">Stars in your universe asking for attention</div></div><div class="f-scroll" id="fScr"></div>';renderFC(fl)}

async function detectFlags(){
  var allE=await db.entries.orderBy('date').toArray(),fl=[],bp={};
  for(var i=0;i<allE.length;i++){var e=allE[i];if(!bp[e.bodyPartId])bp[e.bodyPartId]=[];bp[e.bodyPartId].push(e)}
  for(var pid in bp){pid=parseInt(pid);var ents=bp[pid];ents.sort(function(a,b){return a.date.localeCompare(b.date)});
    var sk=[];for(var i=0;i<ents.length;i++){var e=ents[i],prob=(e.status==='needs_attention'||e.status==='urgent'),noR=(!e.remediation||!e.remediation.trim());if(prob&&noR){sk.push(e)}else{if(sk.length>=5)fl.push({type:'noaction',bodyPartId:pid,days:sk.length,entries:sk.slice(),startDate:sk[0].date,endDate:sk[sk.length-1].date});sk=[]}}
    if(sk.length>=5)fl.push({type:'noaction',bodyPartId:pid,days:sk.length,entries:sk.slice(),startDate:sk[0].date,endDate:sk[sk.length-1].date});
    var rs=null,rt='',st=[];for(var i=0;i<ents.length;i++){var e=ents[i],prob=(e.status==='needs_attention'||e.status==='urgent'),hR=(e.remediation&&e.remediation.trim());if(prob&&hR){if(!rs){rs=e;rt=e.remediation;st=[e]}else st.push(e)}else{if(rs&&st.length>=2){var sp=daysBtw(rs.date,st[st.length-1].date);if(sp>=7)fl.push({type:'noimprove',bodyPartId:pid,days:sp,remediation:rt,entries:st.slice(),startDate:rs.date,endDate:st[st.length-1].date})}rs=null;st=[]}}
    if(rs&&st.length>=2){var sp=daysBtw(rs.date,st[st.length-1].date);if(sp>=7)fl.push({type:'noimprove',bodyPartId:pid,days:sp,remediation:rt,entries:st.slice(),startDate:rs.date,endDate:st[st.length-1].date})}
  }return fl;
}

function renderFC(fl){
  var a=G('fScr');
  if(!fl.length){a.innerHTML='<div class="all-clear"><div class="all-clear-icon">\u2728</div><div class="all-clear-title">All stars shine bright</div><div class="all-clear-sub">No signals right now. Your universe is in harmony.</div></div>';return}
  var na=fl.filter(function(f){return f.type==='noaction'}),ni=fl.filter(function(f){return f.type==='noimprove'}),h='';
  if(na.length){
    h+='<div class="section-label"><span class="section-line"></span><span class="section-text">Dimming stars</span><span class="section-line"></span></div>';
    for(var i=0;i<na.length;i++){var f=na[i],nm=partMap[f.bodyPartId]||'?',tr=bTrend(f.entries);
      var msg='';if(f.days>=10)msg='Your <b>'+nm.toLowerCase()+'</b> has been dimming for <b>'+f.days+' days</b> without any care noted. This star in your universe needs tending. Consider seeing a professional who can help it shine again.';
      else if(f.days>=7)msg='A week of dimming light. Your <b>'+nm.toLowerCase()+'</b> is trying to tell you something. What small step might help it brighten?';
      else msg='Your <b>'+nm.toLowerCase()+'</b> has been dimming for <b>'+f.days+' days</b> without remediation. Even small acts of care can reignite a fading star.';
      h+='<div class="flag-card flag-card-noaction"><div class="flag-type flag-type-noaction">Untended</div><div class="flag-part">'+nm+'</div><div class="flag-duration">'+f.days+' days \u00B7 '+fD(f.startDate)+' \u2013 '+fD(f.endDate)+'</div><div class="trend">'+tr+'<span class="trend-label">daily light</span></div><div class="flag-msg">'+msg+'</div></div>'}}
  if(ni.length){
    h+='<div class="section-label"><span class="section-line"></span><span class="section-text">Unchanged</span><span class="section-line"></span></div>';
    for(var i=0;i<ni.length;i++){var f=ni[i],nm=partMap[f.bodyPartId]||'?',tr=bTrend(f.entries);
      var msg='You\u2019ve been tending to your <b>'+nm.toLowerCase()+'</b> with \u201C'+esc(f.remediation)+'\u201D for <b>'+f.days+' days</b>, but the light hasn\u2019t returned. Perhaps a different approach, or a guide who can see what you can\u2019t, would help this star shine again.';
      h+='<div class="flag-card flag-card-noimprove"><div class="flag-type flag-type-noimprove">Not brightening</div><div class="flag-part">'+nm+'</div><div class="flag-duration">'+f.days+' days \u00B7 '+fD(f.startDate)+' \u2013 '+fD(f.endDate)+'</div><div class="trend">'+tr+'<span class="trend-label">daily light</span></div><div class="flag-rem"><b>Current care:</b> '+esc(f.remediation)+'</div><div class="flag-msg">'+msg+'</div></div>'}}
  a.innerHTML=h;
}
function bTrend(ents){var h='',s=ents[0].date,e=ents[ents.length-1].date,t=daysBtw(s,e)+1,bd={};for(var i=0;i<ents.length;i++)bd[ents[i].date]=ents[i];var mx=14,si=Math.max(0,t-mx);for(var d=si;d<t;d++){var dd=addD(s,d),en=bd[dd];if(en)h+='<span class="trend-dot trend-dot-'+en.status+'">'+(d-si+1)+'</span>';else h+='<span class="trend-dot trend-dot-skip">\u00B7</span>'}return h}
function fD(s){var d=new Date(s+'T12:00:00'),m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[d.getMonth()]+' '+d.getDate()}

/* ══════════════════════════════════════════════════════════════
   ONBOARDING
   ══════════════════════════════════════════════════════════════ */
var obSlide=0;

function obSvgBody(idPrefix,showStars){
  // Build constellation SVG
  var h='';
  // Lines
  for(var i=0;i<CONST_LINES.length;i++){
    var a=BZ[CONST_LINES[i][0]],b=BZ[CONST_LINES[i][1]];
    if(a&&b) h+='<line class="ob-body-line" x1="'+a.cx+'" y1="'+a.cy+'" x2="'+b.cx+'" y2="'+b.cy+'" style="animation-delay:'+(i*0.12)+'s"/>';
  }
  // Stars at each zone
  for(var i=0;i<DEFAULTS.length;i++){
    var z=BZ[DEFAULTS[i]];
    if(!z) continue;
    var cls=showStars?'ob-star-glow':'ob-body-star ob-star-appear';
    var delay=showStars?0:(1.5+i*0.15);
    h+='<circle class="'+cls+'" cx="'+z.cx+'" cy="'+z.cy+'" r="'+(z.r*0.4)+'" style="animation-delay:'+delay+'s"/>';
  }
  return h;
}

function startOnboarding(){
  var ob=G('onboarding');
  ob.style.display='flex';
  obSlide=0;
  renderObSlide();

  // Tap anywhere to advance (except on the last slide where the button handles it)
  ob.addEventListener('click',function(e){
    if(e.target.classList.contains('ob-begin-btn')) return;
    advanceOb();
  });
}

function renderObSlide(){
  var ob=G('onboarding');

  // Build all 4 slides, only the active one is visible
  var slides='';

  // Slide 0: The Shloka
  slides+='<div class="ob-slide'+(obSlide===0?' ob-active':'')+'" id="ob-0">'+
    '<div class="ob-sanskrit">\u092F\u0925\u093E \u092A\u093F\u0923\u094D\u0921\u0947 \u0924\u0925\u093E \u092C\u094D\u0930\u0939\u094D\u092E\u093E\u0923\u094D\u0921\u0947</div>'+
    '<div class="ob-translit">Yath\u0101 pi\u1E47\u1E0De tath\u0101 brahm\u0101\u1E47\u1E0De</div>'+
    '<div class="ob-meaning">As is the body, so is the universe</div>'+
    '<div class="ob-tap">tap to continue</div>'+
  '</div>';

  // Slide 1: The Constellation
  slides+='<div class="ob-slide'+(obSlide===1?' ob-active':'')+'" id="ob-1">'+
    '<svg class="ob-body-svg" viewBox="0 0 220 320">'+obSvgBody('ob1',false)+'</svg>'+
    '<div class="ob-copy">Your body is a constellation of thirteen stars. Each one tells you something \u2014 if you listen.</div>'+
  '</div>';

  // Slide 2: The Breath
  slides+='<div class="ob-slide'+(obSlide===2?' ob-active':'')+'" id="ob-2">'+
    '<div class="ob-neb'+(obSlide===2?' ob-neb-go':'')+'"></div>'+
    '<div class="ob-copy2">Each day, breathe into each star. Four seconds. Feel what it\u2019s telling you. Then record what you notice.</div>'+
  '</div>';

  // Slide 3: The Promise
  slides+='<div class="ob-slide'+(obSlide===3?' ob-active':'')+'" id="ob-3">'+
    '<svg class="ob-constellation-done" viewBox="0 0 220 320">'+obSvgBody('ob3',true)+'</svg>'+
    '<div class="ob-copy2">Tend to your stars daily. Watch patterns emerge. Catch what needs care before it fades.</div>'+
    '<button class="ob-begin-btn" onclick="finishOnboarding()">Begin</button>'+
  '</div>';

  ob.innerHTML=slides;
}

function advanceOb(){
  if(obSlide>=3) return; // last slide, wait for button
  var current=G('ob-'+obSlide);
  if(current){
    current.classList.remove('ob-active');
    current.classList.add('ob-exit');
  }
  obSlide++;
  setTimeout(function(){
    renderObSlide();
    // Trigger nebula animation on slide 2
    if(obSlide===2){
      setTimeout(function(){
        var neb=document.querySelector('.ob-neb');
        if(neb) neb.classList.add('ob-neb-go');
      },100);
    }
  },400);
}

async function finishOnboarding(){
  // Save onboarded flag
  await db.streaks.put({key:'onboarded',count:1,lastDate:today});
  // Fade out onboarding
  var ob=G('onboarding');
  ob.style.transition='opacity 0.6s ease';
  ob.style.opacity='0';
  setTimeout(function(){
    ob.style.display='none';
    G('nav').style.display='flex';
    showToday();
  },600);
}
</script>
